<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="80" y="90" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#1f1f1f">Fine-Tuning and LoRA</text>
  <rect x="140" y="250" width="420" height="320" rx="22" fill="#e8f7e8" stroke="#4caf50" stroke-width="3"/>
  <text x="350" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1f1f1f">Base Model</text>
  <text x="350" y="385" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#374151">Pretrained on broad data</text>
  <text x="350" y="425" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#374151">General behavior</text>
  <line x1="560" y1="410" x2="760" y2="410" stroke="#6b7280" stroke-width="4"/>
  <polygon points="760,410 744,400 744,420" fill="#6b7280"/>
  <rect x="820" y="190" width="600" height="440" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="900" y="280" width="420" height="110" rx="16" fill="#dff1ff" stroke="#4f8cff" stroke-width="3"/>
  <rect x="900" y="430" width="420" height="110" rx="16" fill="#f4e8ff" stroke="#8b5cf6" stroke-width="3"/>
  <text x="1110" y="325" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f1f1f">Full fine-tuning</text>
  <text x="1110" y="360" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#374151">Update all model weights</text>
  <text x="1110" y="475" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1f1f1f">LoRA</text>
  <text x="1110" y="510" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#374151">Train small adapter weights</text>
</svg>
